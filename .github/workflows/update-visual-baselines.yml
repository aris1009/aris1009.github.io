name: Update Visual Regression Baselines

on:
  workflow_dispatch:

jobs:
  update-baselines:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci && npm install --cpu=x64 --os=linux --libc=glibc sharp

    - name: Build site (production)
      run: npm run build:prod

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Update visual regression baselines
      run: npx playwright test visual-regression --update-snapshots

    - name: Upload updated baselines
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-baselines
        path: tests/e2e/visual-regression.spec.js-snapshots/
        if-no-files-found: error
